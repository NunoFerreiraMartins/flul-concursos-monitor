name: Monitor Concursos FLUL

on:
  schedule:
    # Executa todos os dias às 08:00 UTC (09:00 em Portugal no inverno, 10:00 no verão)
    - cron: "0 8 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar monitor
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python check.py

      - name: Guardar histórico atualizado
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add concursos.json

          if git diff --cached --quiet; then
            echo "Sem alterações."
          else
            git commit -m "Atualização automática do histórico"
            git push
          fi
